services:
    prometheus:
      image: prom/prometheus:latest
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
      networks:
        - dev-network
      ports:
        - "9090:9090"
    grafana:
      image: grafana/grafana:latest
      ports:
        - "3000:3000"
      networks:
        - dev-network

volumes:
  prometheus_data: {}

networks:
  dev-network:
    driver: bridge