services:
    prometheus:
      image: prom/prometheus:latest
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
        - prometheus_data:/prometheus
      networks:
        - dev-network
      ports:
        - "9090:9090"
    grafana:
      image: grafana/grafana:latest
      volumes:
        - grafana:/var/lib/grafana
      ports:
        - "3000:3000"
      networks:
        - dev-network
    jaeger:
      image: jaegertracing/all-in-one:latest
      ports:
        - "16686:16686"   # UI
        - "4317:4317"     # OTLP gRPC
        - "4318:4318"     # OTLP HTTP
      networks:
        - dev-network

volumes:
  prometheus_data:
  grafana:

networks:
  dev-network:
    driver: bridge